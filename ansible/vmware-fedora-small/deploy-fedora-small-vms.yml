---
# Deploy the Fedora-small golden VMDK as todo-db, clone todo-web, power on, discover IPs,
# then (by default) SSH into each guest and run vm-configure automatically.
#
# Prerequisites: golden/fedora-small.yml has produced
#   ~/fedora-small-build/golden/todo_small.vmdk
#
#   sudo ansible-playbook deploy-fedora-small-vms.yml -e @credentials.env
#
# Skip remote configure: -e auto_configure_guests=false

- name: Deploy Fedora-small todo-db and todo-web from golden VMDK
  hosts: bastion
  gather_facts: true
  become: true

  vars:
    govc_cmd: >-
      podman run --rm --env-file {{ govc_env_path }}
      {{ govc_image }} /govc
    guest_ssh_base: >-
      sshpass -e ssh
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o PreferredAuthentications=password
      -o PubkeyAuthentication=no
      -o ConnectTimeout=10

  tasks:
    - name: Ensure work base exists
      ansible.builtin.file:
        path: "{{ work_base }}"
        state: directory
        mode: "0755"

    - name: Render govc environment file
      ansible.builtin.template:
        src: govc.env.j2
        dest: "{{ govc_env_path }}"
        mode: "0600"
      become: false

    - name: Assert golden VMDK exists
      ansible.builtin.stat:
        path: "{{ golden_dir }}/todo_small.vmdk"
      register: golden_vmdk

    - name: Fail when golden VMDK is missing
      ansible.builtin.fail:
        msg: >-
          Missing {{ golden_dir }}/todo_small.vmdk.
          Run: sudo ansible-playbook golden/fedora-small.yml -e @credentials.env
      when: not golden_vmdk.stat.exists

    - name: Deploy todo-db from golden VMDK
      ansible.builtin.include_role:
        name: vmware-vm
      vars:
        vm_name: "{{ db01_vm_name }}"
        vm_build_dir: "{{ golden_dir }}"
        vm_datastore_folder: todo-db
        vm_vmdk_filename: todo-db-disk1.vmdk
        vm_wait_for_ip: "{{ db01_static_ip | length == 0 }}"
        vm_static_ip: "{{ db01_static_ip }}"
        vm_ip_fact_name: discovered_todo_db_ip
        vm_power_on: true
      tags: [db01]

    - name: Set todo_db_ip fact
      ansible.builtin.set_fact:
        todo_db_ip: "{{ db01_static_ip if db01_static_ip | length > 0 else discovered_todo_db_ip }}"
      tags: [db01, web01]

    - name: Check whether todo-web already exists
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} find {{ vm_folder }} -type m -name {{ web01_vm_name }}"
      register: web_find
      failed_when: false
      changed_when: false
      tags: [web01]

    - name: Clone todo-db to todo-web
      ansible.builtin.command:
        cmd: >-
          {{ govc_cmd }} vm.clone
          -vm {{ db01_vm_name }}
          -on=false
          -folder "{{ vm_folder }}"
          {{ web01_vm_name }}
      when: web_find.stdout | trim | length == 0
      tags: [web01]

    - name: Power on todo-web
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} vm.power -on {{ web01_vm_name }}"
      when: web_find.stdout | trim | length == 0
      tags: [web01]

    - name: Discover or publish todo-web IP
      when: web01_static_ip | length == 0
      block:
        - name: Wait for todo-web IP via VMware Tools
          ansible.builtin.command:
            cmd: "{{ govc_cmd }} vm.ip -wait={{ vm_ip_wait }} {{ web01_vm_name }}"
          register: web_ip_raw
          retries: "{{ vm_ip_retries }}"
          delay: "{{ vm_ip_retry_delay }}"
          until: web_ip_raw.stdout | trim | length > 0
          changed_when: false

        - name: Set discovered todo_web_ip
          ansible.builtin.set_fact:
            todo_web_ip: "{{ web_ip_raw.stdout | trim }}"
      tags: [web01, bastion-firewall]

    - name: Set todo_web_ip from static config
      ansible.builtin.set_fact:
        todo_web_ip: "{{ web01_static_ip }}"
      when: web01_static_ip | length > 0
      tags: [web01, bastion-firewall]

    - name: Report discovered guest IPs
      ansible.builtin.debug:
        msg: |
          VMs are up.
            todo-db  IP: {{ todo_db_ip }}
            todo-web IP: {{ todo_web_ip }}
      tags: [db01, web01]

    - name: Skip remote guest configure
      ansible.builtin.debug:
        msg: |
          auto_configure_guests=false — configure manually on each guest
          ({{ guest_ssh_user }} / {{ guest_password }}):

            # todo-db
            cd /home/fedora/vm-configure
            sudo ansible-playbook todo-db.yml \
              -e todo_db_ip={{ todo_db_ip }} \
              -e net_gateway={{ net_gateway }} \
              -e net_dns={{ net_dns }}

            # todo-web
            cd /home/fedora/vm-configure
            sudo ansible-playbook todo-web.yml \
              -e todo_db_ip={{ todo_db_ip }} \
              -e net_gateway={{ net_gateway }} \
              -e net_dns={{ net_dns }}
      when: not (auto_configure_guests | bool)
      tags: [configure]

    - name: Ensure sshpass is installed for remote configure
      ansible.builtin.package:
        name: sshpass
        state: present
      when: auto_configure_guests | bool
      tags: [configure]

    - name: Wait for SSH on todo-db
      ansible.builtin.wait_for:
        host: "{{ todo_db_ip }}"
        port: 22
        timeout: "{{ guest_ssh_timeout }}"
        search_regex: OpenSSH
      when: auto_configure_guests | bool
      tags: [configure, db01]

    - name: Configure todo-db over SSH
      ansible.builtin.shell: |
        {{ guest_ssh_base }} {{ guest_ssh_user }}@{{ todo_db_ip }} \
          "cd /home/fedora/vm-configure && sudo ansible-playbook todo-db.yml \
            -e todo_db_ip={{ todo_db_ip }} \
            {% if db01_static_ip | length > 0 %}-e db01_static_ip={{ db01_static_ip }} \{% endif %}
            -e net_gateway={{ net_gateway }} \
            -e net_dns={{ net_dns }}"
      args:
        executable: /bin/bash
      environment:
        SSHPASS: "{{ guest_password }}"
      when: auto_configure_guests | bool
      tags: [configure, db01]

    - name: Wait for SSH on todo-web
      ansible.builtin.wait_for:
        host: "{{ todo_web_ip }}"
        port: 22
        timeout: "{{ guest_ssh_timeout }}"
        search_regex: OpenSSH
      when: auto_configure_guests | bool
      tags: [configure, web01]

    - name: Configure todo-web over SSH
      ansible.builtin.shell: |
        {{ guest_ssh_base }} {{ guest_ssh_user }}@{{ todo_web_ip }} \
          "cd /home/fedora/vm-configure && sudo ansible-playbook todo-web.yml \
            -e todo_db_ip={{ todo_db_ip }} \
            {% if web01_static_ip | length > 0 %}-e web01_static_ip={{ web01_static_ip }} \{% endif %}
            -e net_gateway={{ net_gateway }} \
            -e net_dns={{ net_dns }}"
      args:
        executable: /bin/bash
      environment:
        SSHPASS: "{{ guest_password }}"
      when: auto_configure_guests | bool
      tags: [configure, web01]

    - name: Verify todo-web health from bastion
      ansible.builtin.uri:
        url: "http://{{ todo_web_ip }}:{{ app_port }}/health"
        return_content: true
      register: web_health
      until: web_health.status | default(0) == 200
      retries: 20
      delay: 5
      when: auto_configure_guests | bool
      tags: [configure, web01]

    - name: Report auto-configure result
      ansible.builtin.debug:
        msg: |
          Guests configured.
            todo-db  IP: {{ todo_db_ip }}
            todo-web IP: {{ todo_web_ip }}
            health: {{ web_health.content | default('n/a') }}
          curl http://{{ todo_web_ip }}:{{ app_port }}/health
      when: auto_configure_guests | bool
      tags: [configure]

- name: Configure bastion firewall HTTP forward to todo-web
  hosts: bastion
  gather_facts: false
  become: true
  roles:
    - role: bastion-firewall
      tags: [bastion-firewall]
