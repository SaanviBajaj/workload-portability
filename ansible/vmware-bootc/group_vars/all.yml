---
# VMware vCenter / govc settings
# Copy credentials.env.example to credentials.env and override sandbox-specific values.
govc_url: "https://vcsnsx-vc.infra.demo.redhat.com"
govc_username: "sandbox-XXXXX@demo"
govc_password: "YourPasswordHere"
govc_insecure: true
govc_datastore: "workload_share_XXXXX"

# VMware VM placement
vm_network: "segment-sandbox-XXXXX"
vm_folder: "/SDDC-Datacenter/vm/Workloads/sandbox-XXXXX"
vm_guest_id: "rhel9_64Guest"
vm_cpus: 2
vm_memory_mb: 4096
vm_disk_controller: "pvscsi"

# Datastore paths for VMDK upload (relative to datastore root)
datastore_base: "ANZ-Workload-Portability"

# VM names
db01_vm_name: "todo-db"
web01_vm_name: "todo-web"

# Container images
centos_bootc_base: "quay.io/centos-bootc/centos-bootc:stream9"
bootc_image_builder: "quay.io/centos-bootc/bootc-image-builder:latest"
govc_image: "docker.io/vmware/govc:latest"
todo_db_image: "quay.io/rh-ee-sbajaj/todo-db:latest"
todo_web_image: "quay.io/rh-ee-sbajaj/todo-web:latest"

# Local bootc image tags
db01_bootc_tag: "my-bootc-todo-db:latest"
web01_bootc_tag: "my-bootc-todo-web:latest"

# Build directories on the bastion
work_base: "{{ ansible_env.HOME }}/bootc-build"
govc_env_path: "{{ work_base }}/govc.env"

# Web VM login (baked into web01 image via config.toml)
web_ssh_user: "demo"
web_ssh_password: "demo"

# Override after DB VM is deployed; leave empty to auto-detect via govc
db_host: ""
db_port: 5432

# How long to wait for VMware Tools IP (govc -wait flag)
vm_ip_wait: "5m"

# Podman build/bootc-image-builder typically need root on the bastion
podman_become: true
