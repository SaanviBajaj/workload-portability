---
# Tear down minimal Alpine todo-db + todo-web VMs and related resources.
#
# Run on the bastion VM:
#   cd ansible/vmware-minimal
#   sudo ansible-playbook cleanup-minimal-vms.yml -e @credentials.env
#
# Run only part of the cleanup:
#   sudo ansible-playbook cleanup-minimal-vms.yml -e @credentials.env --tags vms
#   sudo ansible-playbook cleanup-minimal-vms.yml -e @credentials.env --tags vmdks
#   sudo ansible-playbook cleanup-minimal-vms.yml -e @credentials.env --tags bastion-firewall
#   sudo ansible-playbook cleanup-minimal-vms.yml -e @credentials.env --tags local

- name: Clean up minimal Alpine todo VMs and demo resources
  hosts: bastion
  gather_facts: true
  become: true
  vars:
    db01_vmdk_upload: "{{ datastore_base }}/todo-db-disk1.vmdk"
    db01_vmdk_final: "{{ datastore_base }}/todo-db/todo-db-disk1.vmdk"
    web01_vmdk_upload: "{{ datastore_base }}/todo-web-disk1.vmdk"
    web01_vmdk_final: "{{ datastore_base }}/todo-web/todo-web-disk1.vmdk"
    govc_cmd: >-
      podman run --rm --env-file {{ govc_env_path }}
      {{ govc_image }} /govc
    datastore_vmdk_paths:
      - "{{ db01_vmdk_upload }}"
      - "{{ db01_vmdk_final }}"
      - "{{ web01_vmdk_upload }}"
      - "{{ web01_vmdk_final }}"

  tasks:
    - name: Ensure govc environment file exists
      ansible.builtin.stat:
        path: "{{ govc_env_path }}"
      register: govc_env_stat
      tags: [always]

    - name: Fail when govc.env is missing
      ansible.builtin.fail:
        msg: >-
          {{ govc_env_path }} not found. Run the build playbook first or copy
          credentials into {{ work_base }}/govc.env.
      when: not govc_env_stat.stat.exists
      tags: [always]

    # -------------------------------------------------------------------------
    # Bastion firewall — remove HTTP forward to todo-web
    # -------------------------------------------------------------------------
    - name: Discover todo-web IP for firewall cleanup
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} vm.ip {{ web01_vm_name }}"
      register: cleanup_web_ip
      failed_when: false
      changed_when: false
      when: cleanup_bastion_firewall | bool
      tags: [bastion-firewall]

    - name: Check whether bastion HTTP forward rule exists
      ansible.builtin.command:
        cmd: >-
          firewall-cmd --query-forward-port=port={{ bastion_firewall_forward_port }}:proto=tcp:toport={{ todo_web_service_port }}:toaddr={{ cleanup_web_ip.stdout | trim }}
      register: fw_forward_check
      failed_when: false
      changed_when: false
      when:
        - cleanup_bastion_firewall | bool
        - cleanup_web_ip.stdout | trim | length > 0
      tags: [bastion-firewall]

    - name: Remove bastion HTTP forward to todo-web
      ansible.builtin.command:
        cmd: >-
          firewall-cmd --permanent
          --remove-forward-port=port={{ bastion_firewall_forward_port }}:proto=tcp:toport={{ todo_web_service_port }}:toaddr={{ cleanup_web_ip.stdout | trim }}
      when:
        - cleanup_bastion_firewall | bool
        - cleanup_web_ip.stdout | trim | length > 0
        - fw_forward_check.rc == 0
      tags: [bastion-firewall]

    - name: Check whether bastion allows incoming HTTP port
      ansible.builtin.command:
        cmd: firewall-cmd --query-port={{ bastion_firewall_forward_port }}/tcp
      register: fw_http_port_check
      failed_when: false
      changed_when: false
      when: cleanup_bastion_firewall | bool
      tags: [bastion-firewall]

    - name: Remove incoming HTTP port from bastion firewall
      ansible.builtin.command:
        cmd: firewall-cmd --permanent --remove-port={{ bastion_firewall_forward_port }}/tcp
      when:
        - cleanup_bastion_firewall | bool
        - fw_http_port_check.rc == 0
      tags: [bastion-firewall]

    - name: Check whether masquerade is enabled on bastion
      ansible.builtin.command:
        cmd: firewall-cmd --query-masquerade
      register: fw_masq_check
      failed_when: false
      changed_when: false
      when:
        - cleanup_bastion_firewall | bool
        - cleanup_remove_masquerade | bool
      tags: [bastion-firewall]

    - name: Remove masquerade from bastion firewall
      ansible.builtin.command:
        cmd: firewall-cmd --permanent --remove-masquerade
      when:
        - cleanup_bastion_firewall | bool
        - cleanup_remove_masquerade | bool
        - fw_masq_check.rc == 0
      tags: [bastion-firewall]

    - name: Reload bastion firewall after cleanup
      ansible.builtin.command:
        cmd: firewall-cmd --reload
      when: cleanup_bastion_firewall | bool
      changed_when: true
      tags: [bastion-firewall]

    # -------------------------------------------------------------------------
    # VMware VMs
    # -------------------------------------------------------------------------
    - name: Check whether todo-web VM exists
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} find {{ vm_folder }} -type m -name {{ web01_vm_name }}"
      register: web01_vm_find
      failed_when: false
      changed_when: false
      when: cleanup_vms | bool
      tags: [vms]

    - name: Power off todo-web VM
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} vm.power -s -off {{ web01_vm_name }}"
      when:
        - cleanup_vms | bool
        - web01_vm_find.stdout | trim | length > 0
      failed_when: false
      tags: [vms]

    - name: Destroy todo-web VM
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} vm.destroy {{ web01_vm_name }}"
      when:
        - cleanup_vms | bool
        - web01_vm_find.stdout | trim | length > 0
      tags: [vms]

    - name: Check whether todo-db VM exists
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} find {{ vm_folder }} -type m -name {{ db01_vm_name }}"
      register: db01_vm_find
      failed_when: false
      changed_when: false
      when: cleanup_vms | bool
      tags: [vms]

    - name: Power off todo-db VM
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} vm.power -s -off {{ db01_vm_name }}"
      when:
        - cleanup_vms | bool
        - db01_vm_find.stdout | trim | length > 0
      failed_when: false
      tags: [vms]

    - name: Destroy todo-db VM
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} vm.destroy {{ db01_vm_name }}"
      when:
        - cleanup_vms | bool
        - db01_vm_find.stdout | trim | length > 0
      tags: [vms]

    # -------------------------------------------------------------------------
    # Datastore VMDKs
    # -------------------------------------------------------------------------
    - name: Remove uploaded VMDKs from datastore
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} datastore.rm {{ item }}"
      loop: "{{ datastore_vmdk_paths }}"
      failed_when: false
      when: cleanup_datastore_vmdks | bool
      tags: [vmdks]

    - name: Remove datastore subfolders
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} datastore.rm {{ item }}"
      loop:
        - "{{ datastore_base }}/todo-db"
        - "{{ datastore_base }}/todo-web"
      failed_when: false
      when: cleanup_datastore_folder | bool
      tags: [vmdks]

    - name: Remove datastore Workload-Portability folder
      ansible.builtin.command:
        cmd: "{{ govc_cmd }} datastore.rm {{ datastore_base }}"
      failed_when: false
      when: cleanup_datastore_folder | bool
      tags: [vmdks]

    # -------------------------------------------------------------------------
    # Local bastion build artifacts
    # -------------------------------------------------------------------------
    - name: Remove local minimal build directory
      ansible.builtin.file:
        path: "{{ work_base }}"
        state: absent
      when: cleanup_local_build | bool
      tags: [local]
