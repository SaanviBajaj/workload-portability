---
# db or web — set by the playbook
alpine_role: db
alpine_build_dir: "{{ work_base }}/alpine-build"
alpine_hostname: alpine-vm

alpine_image: "docker.io/library/alpine:{{ alpine_version }}"
alpine_output_dir: "{{ alpine_build_dir }}/output"
alpine_mnt: "{{ alpine_build_dir }}/mnt"
alpine_raw: "{{ alpine_build_dir }}/disk.raw"
alpine_vmdk: "{{ alpine_output_dir }}/disk.vmdk"

alpine_common_packages:
  - openrc
  - alpine-conf
  - busybox-openrc
  - e2fsprogs
  - grub-bios
  - linux-virt
  - podman
  - open-vm-tools
  - open-vm-tools-openrc
  - open-vm-tools-guestinfo

alpine_web_packages:
  - openssh
  - openssh-server-sftp-server
  - shadow
  - sudo

alpine_openrc_services:
  - { service: hostname, runlevel: boot }
  - { service: networking, runlevel: boot }
  - { service: local, runlevel: default }
  - { service: open-vm-tools, runlevel: boot }

alpine_web_openrc_services:
  - { service: sshd, runlevel: default }

# SELinux on lab bastions blocks writes without label=disable
alpine_podman_run: "podman run --rm --user 0:0 --security-opt label=disable"
alpine_podman_run_privileged: "podman run --rm --privileged --user 0:0 --security-opt label=disable"
