---
- name: Require DB host when building todo-web image
  ansible.builtin.fail:
    msg: "db_host must be set when alpine_role is web"
  when:
    - alpine_role == 'web'
    - db_host | length == 0

- name: Build Alpine package list for image role
  ansible.builtin.set_fact:
    alpine_install_packages: >-
      {{ alpine_common_packages +
         (alpine_web_packages if alpine_role == 'web' else []) }}

- name: Ensure Alpine build directory exists for wrapper script
  ansible.builtin.file:
    path: "{{ alpine_build_dir }}"
    state: directory
    mode: "0755"

- name: Deploy qemu-img wrapper script
  ansible.builtin.template:
    src: qemu-img-wrapper.j2
    dest: "{{ alpine_build_dir }}/qemu-img-wrapper"
    mode: "0755"

- name: Set qemu-img command path
  ansible.builtin.set_fact:
    alpine_qemu_img: "{{ alpine_build_dir }}/qemu-img-wrapper"

- name: Build Alpine VMDK image
  block:
    - name: Ensure Alpine build directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ alpine_build_dir }}"
        - "{{ alpine_output_dir }}"
        - "{{ alpine_mnt }}"

    - name: Remove previous Alpine disk artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ alpine_raw }}"
        - "{{ alpine_vmdk }}"

    - name: Create raw disk image
      ansible.builtin.command:
        cmd: "{{ alpine_qemu_img }} create -f raw {{ alpine_raw }} {{ disk_mb }}M"

    - name: Partition raw disk with MBR layout
      ansible.builtin.shell: |
        set -o pipefail
        printf 'label: dos\n,,L\n' | sfdisk -f {{ alpine_raw }}
      args:
        executable: /bin/bash

    - name: Attach loop device to raw disk
      ansible.builtin.command:
        cmd: losetup -Pf --show {{ alpine_raw }}
      register: alpine_loop_setup
      changed_when: true

    - name: Record loop device paths
      ansible.builtin.set_fact:
        alpine_loop: "{{ alpine_loop_setup.stdout | trim }}"
        alpine_loop_part: "{{ alpine_loop_setup.stdout | trim }}p1"

    - name: Format Alpine root partition
      ansible.builtin.command:
        cmd: mkfs.ext4 -F -L alpine-root {{ alpine_loop_part }}

    - name: Mount Alpine root partition
      ansible.builtin.command:
        cmd: mount -t ext4 {{ alpine_loop_part }} {{ alpine_mnt }}

    - name: Ensure apk config directories exist in Alpine rootfs
      ansible.builtin.file:
        path: "{{ alpine_mnt }}/etc/apk/keys"
        state: directory
        mode: "0755"

    - name: Seed apk signing keys into Alpine rootfs
      ansible.builtin.command:
        cmd: >-
          {{ alpine_podman_run }} -v {{ alpine_mnt }}:/mnt {{ alpine_image }}
          sh -c "cp -a /etc/apk/keys/. /mnt/etc/apk/keys/"

    - name: Configure apk repositories in Alpine rootfs
      ansible.builtin.template:
        src: apk-repositories.j2
        dest: "{{ alpine_mnt }}/etc/apk/repositories"
        mode: "0644"

    - name: Bootstrap Alpine base rootfs
      ansible.builtin.command:
        cmd: >-
          {{ alpine_podman_run }}
          -v {{ alpine_mnt }}:/mnt
          -v /etc/resolv.conf:/etc/resolv.conf:ro
          {{ alpine_image }}
          sh -ec "apk add --root /mnt --initdb --arch x86_64 alpine-base"

    - name: Install Alpine packages into rootfs
      ansible.builtin.command:
        cmd: >-
          {{ alpine_podman_run }}
          -v {{ alpine_mnt }}:/mnt
          -v /etc/resolv.conf:/etc/resolv.conf:ro
          {{ alpine_image }}
          sh -ec "apk add --root /mnt --arch x86_64 {{ alpine_install_packages | join(' ') }}"

    - name: Set Alpine hostname
      ansible.builtin.copy:
        content: "{{ alpine_hostname }}\n"
        dest: "{{ alpine_mnt }}/etc/hostname"
        mode: "0644"

    - name: Deploy Alpine network configuration
      ansible.builtin.template:
        src: network-interfaces.j2
        dest: "{{ alpine_mnt }}/etc/network/interfaces"
        mode: "0644"

    - name: Deploy VMware NIC kernel modules for early boot
      ansible.builtin.template:
        src: modules.j2
        dest: "{{ alpine_mnt }}/etc/modules"
        mode: "0644"

    - name: Ensure Alpine log and image directories exist
      ansible.builtin.file:
        path: "{{ alpine_mnt }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - var/log
        - tmp

    - name: Deploy Alpine fstab for root filesystem
      ansible.builtin.template:
        src: fstab.j2
        dest: "{{ alpine_mnt }}/etc/fstab"
        mode: "0644"

    - name: Ensure Alpine local.d directory exists
      ansible.builtin.file:
        path: "{{ alpine_mnt }}/etc/local.d"
        state: directory
        mode: "0755"

    - name: Ensure Alpine local bin directory exists
      ansible.builtin.file:
        path: "{{ alpine_mnt }}/usr/local/bin"
        state: directory
        mode: "0755"

    - name: Deploy DNS helper for DHCP environments
      ansible.builtin.template:
        src: ensure-dns.sh.j2
        dest: "{{ alpine_mnt }}/usr/local/bin/ensure-dns"
        mode: "0755"

    - name: Deploy Podman network sysctl settings
      ansible.builtin.template:
        src: podman-sysctl.conf.j2
        dest: "{{ alpine_mnt }}/etc/sysctl.d/99-podman.conf"
        mode: "0644"

    - name: Deploy Podman kernel modules for boot
      ansible.builtin.template:
        src: podman-modules.conf.j2
        dest: "{{ alpine_mnt }}/etc/modules-load.d/podman.conf"
        mode: "0644"

    - name: Deploy Podman network prepare helper
      ansible.builtin.template:
        src: prepare-podman-net.sh.j2
        dest: "{{ alpine_mnt }}/usr/local/bin/prepare-podman-net"
        mode: "0755"

    - name: Deploy todo-db container start script
      ansible.builtin.template:
        src: todo-db-start.sh.j2
        dest: "{{ alpine_mnt }}/usr/local/bin/todo-db-start"
        mode: "0755"
      when: alpine_role == 'db'

    - name: Deploy todo-db OpenRC service
      ansible.builtin.template:
        src: todo-db.openrc.j2
        dest: "{{ alpine_mnt }}/etc/init.d/todo-db"
        mode: "0755"
      when: alpine_role == 'db'

    - name: Deploy todo-web container start script
      ansible.builtin.template:
        src: todo-web-start.sh.j2
        dest: "{{ alpine_mnt }}/usr/local/bin/todo-web-start"
        mode: "0755"
      when: alpine_role == 'web'

    - name: Deploy todo-web OpenRC service
      ansible.builtin.template:
        src: todo-web.openrc.j2
        dest: "{{ alpine_mnt }}/etc/init.d/todo-web"
        mode: "0755"
      when: alpine_role == 'web'

    - name: Deploy network wait helper for VMware NIC
      ansible.builtin.template:
        src: network-wait.start.j2
        dest: "{{ alpine_mnt }}/etc/local.d/00-network-wait.start"
        mode: "0755"

    - name: Deploy VMware Tools startup helper
      ansible.builtin.template:
        src: vmtools.start.j2
        dest: "{{ alpine_mnt }}/etc/local.d/01-vmtools.start"
        mode: "0755"

    - name: Deploy SSH startup helper
      ansible.builtin.template:
        src: sshd.start.j2
        dest: "{{ alpine_mnt }}/etc/local.d/02-sshd.start"
        mode: "0755"
      when: alpine_role == 'web'

    - name: Create demo SSH user in Alpine rootfs
      ansible.builtin.command:
        cmd: >-
          {{ alpine_podman_run }} -v {{ alpine_mnt }}:/mnt {{ alpine_image }}
          chroot /mnt adduser -D -s /bin/ash {{ web_ssh_user }}
      when: alpine_role == 'web'

    - name: Set demo SSH user password
      ansible.builtin.shell: |
        set -o pipefail
        echo '{{ web_ssh_user }}:{{ web_ssh_password }}' | \
          {{ alpine_podman_run }} -i -v {{ alpine_mnt }}:/mnt {{ alpine_image }} \
          chroot /mnt chpasswd
      args:
        executable: /bin/bash
      when: alpine_role == 'web'
      no_log: true

    - name: Add demo user to wheel group
      ansible.builtin.command:
        cmd: >-
          {{ alpine_podman_run }} -v {{ alpine_mnt }}:/mnt {{ alpine_image }}
          chroot /mnt addgroup {{ web_ssh_user }} wheel
      register: alpine_wheel_add
      failed_when: false
      changed_when: alpine_wheel_add.rc == 0
      when: alpine_role == 'web'

    - name: Allow passwordless sudo for wheel group
      ansible.builtin.lineinfile:
        path: "{{ alpine_mnt }}/etc/sudoers"
        line: "%wheel ALL=(ALL) NOPASSWD: ALL"
        create: false
      when: alpine_role == 'web'

    - name: Ensure sshd config drop-in directory exists
      ansible.builtin.file:
        path: "{{ alpine_mnt }}/etc/ssh/sshd_config.d"
        state: directory
        mode: "0755"
      when: alpine_role == 'web'

    - name: Enable SSH password authentication for demo user
      ansible.builtin.template:
        src: sshd-demo.conf.j2
        dest: "{{ alpine_mnt }}/etc/ssh/sshd_config.d/99-demo.conf"
        mode: "0644"
      when: alpine_role == 'web'

    - name: Generate SSH host keys for first boot
      ansible.builtin.command:
        cmd: >-
          {{ alpine_podman_run }} -v {{ alpine_mnt }}:/mnt {{ alpine_image }}
          chroot /mnt ssh-keygen -A
      when: alpine_role == 'web'

    - name: Set container image to embed in Alpine VMDK
      ansible.builtin.set_fact:
        alpine_embed_image: "{{ todo_db_image if alpine_role == 'db' else todo_web_image }}"
        alpine_embed_tar: "{{ 'todo-db' if alpine_role == 'db' else 'todo-web' }}.tar"
        alpine_embed_tar_path: "{{ todo_db_image_tar if alpine_role == 'db' else todo_web_image_tar }}"

    - name: Pull container image on bastion for VMDK embedding
      ansible.builtin.command:
        cmd: podman pull {{ alpine_embed_image }}
      register: alpine_embed_pull
      failed_when: false
      changed_when: alpine_embed_pull.rc == 0

    - name: Save pulled container image archive for VMDK embedding
      ansible.builtin.command:
        cmd: podman save -o {{ alpine_build_dir }}/{{ alpine_embed_tar }} {{ alpine_embed_image }}
      when: alpine_embed_pull.rc == 0
      changed_when: true

    - name: Check for offline container image archive on bastion
      ansible.builtin.stat:
        path: "{{ alpine_embed_tar_path }}"
      register: alpine_offline_tar
      when: alpine_embed_pull.rc != 0

    - name: Stage offline container image archive for VMDK embedding
      ansible.builtin.copy:
        src: "{{ alpine_embed_tar_path }}"
        dest: "{{ alpine_build_dir }}/{{ alpine_embed_tar }}"
        remote_src: true
        mode: "0644"
      when:
        - alpine_embed_pull.rc != 0
        - alpine_offline_tar.stat.exists

    - name: Fail when container image is unavailable for embedding
      ansible.builtin.fail:
        msg: >-
          Could not pull {{ alpine_embed_image }} (quay.io often denies pulls in lab environments).
          On a machine that can reach quay.io, run:
            podman pull {{ alpine_embed_image }}
            podman save -o {{ alpine_embed_tar }} {{ alpine_embed_image }}
          Copy {{ alpine_embed_tar }} to the bastion at {{ alpine_embed_tar_path }}, then re-run the playbook.
      when:
        - alpine_embed_pull.rc != 0
        - not (alpine_offline_tar.stat.exists | default(false))

    - name: Remove previous bastion Podman preload storage
      ansible.builtin.file:
        path: "{{ alpine_build_dir }}/podman-preload"
        state: absent

    - name: Ensure bastion Podman preload directory exists
      ansible.builtin.file:
        path: "{{ alpine_build_dir }}/podman-preload"
        state: directory
        mode: "0755"

    - name: Load container image into bastion-side Podman storage
      ansible.builtin.command:
        cmd: podman --root {{ alpine_build_dir }}/podman-preload load -i {{ alpine_build_dir }}/{{ alpine_embed_tar }}

    - name: Ensure Alpine Podman storage directory exists
      ansible.builtin.file:
        path: "{{ alpine_mnt }}/var/lib/containers/storage"
        state: directory
        mode: "0755"

    - name: Copy preloaded Podman storage into Alpine rootfs
      ansible.builtin.command:
        cmd: cp -a {{ alpine_build_dir }}/podman-preload/. {{ alpine_mnt }}/var/lib/containers/storage/

    - name: Remove bastion-side Podman preload storage
      ansible.builtin.file:
        path: "{{ alpine_build_dir }}/podman-preload"
        state: absent

    - name: Remove container image archive from bastion build dir
      ansible.builtin.file:
        path: "{{ alpine_build_dir }}/{{ alpine_embed_tar }}"
        state: absent

    - name: Enable OpenRC services in Alpine chroot
      ansible.builtin.command:
        cmd: >-
          {{ alpine_podman_run }} -v {{ alpine_mnt }}:/mnt {{ alpine_image }}
          chroot /mnt rc-update add {{ item.service }} {{ item.runlevel }}
      loop: >-
        {{ alpine_openrc_services +
           (alpine_db_openrc_services if alpine_role == 'db' else []) +
           (alpine_web_openrc_services if alpine_role == 'web' else []) }}

    - name: Generate Alpine initramfs
      ansible.builtin.shell: |
        set -o pipefail
        KERNEL_VER="$(ls {{ alpine_mnt }}/lib/modules | head -1)"
        {{ alpine_podman_run }} -v {{ alpine_mnt }}:/mnt {{ alpine_image }} \
          chroot /mnt mkinitfs -f /etc/fstab -F "base ext4 scsi virtio ide dhcp" "${KERNEL_VER}"
      args:
        executable: /bin/bash

    - name: Trim Alpine apk cache
      ansible.builtin.file:
        path: "{{ alpine_mnt }}/var/cache/apk"
        state: absent

    - name: Ensure chroot mount points exist in Alpine rootfs
      ansible.builtin.file:
        path: "{{ alpine_mnt }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - dev
        - proc
        - sys

    - name: Bind mount dev into Alpine chroot
      ansible.builtin.command:
        cmd: mount --bind /dev {{ alpine_mnt }}/dev

    - name: Bind mount proc into Alpine chroot
      ansible.builtin.command:
        cmd: mount --bind /proc {{ alpine_mnt }}/proc

    - name: Bind mount sys into Alpine chroot
      ansible.builtin.command:
        cmd: mount --bind /sys {{ alpine_mnt }}/sys

    - name: Configure GRUB defaults for Alpine rootfs
      ansible.builtin.template:
        src: grub-default.j2
        dest: "{{ alpine_mnt }}/etc/default/grub"
        mode: "0644"

    - name: Install GRUB bootloader in Alpine chroot
      ansible.builtin.command:
        cmd: chroot {{ alpine_mnt }} grub-install --target=i386-pc --boot-directory=/boot {{ alpine_loop }}

    - name: Generate GRUB configuration in Alpine chroot
      ansible.builtin.command:
        cmd: chroot {{ alpine_mnt }} grub-mkconfig -o /boot/grub/grub.cfg

    - name: Sync disk before unmount
      ansible.builtin.command:
        cmd: sync

    - name: Convert raw disk to streamOptimized VMDK
      ansible.builtin.command:
        cmd: >-
          {{ alpine_qemu_img }} convert -f raw -O vmdk
          -o subformat=streamOptimized
          {{ alpine_raw }} {{ alpine_vmdk }}

    - name: Show Alpine VMDK size
      ansible.builtin.command:
        cmd: du -h {{ alpine_vmdk }}
      register: alpine_vmdk_size
      changed_when: false

    - name: Report Alpine VMDK build result
      ansible.builtin.debug:
        msg: "Built {{ alpine_vmdk }} ({{ alpine_vmdk_size.stdout | trim }})"

  always:
    - name: Unmount Alpine chroot bind mounts
      ansible.builtin.command:
        cmd: umount {{ alpine_mnt }}/{{ item }}
      loop:
        - sys
        - proc
        - dev
      failed_when: false

    - name: Unmount Alpine root partition
      ansible.builtin.command:
        cmd: umount {{ alpine_mnt }}
      failed_when: false

    - name: Detach loop device from raw disk
      ansible.builtin.command:
        cmd: losetup -d {{ alpine_loop }}
      when: alpine_loop is defined
      failed_when: false
