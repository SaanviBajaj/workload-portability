---
# VMware vCenter / govc settings
# Copy credentials.env.example to credentials.env and override sandbox-specific values.
govc_url: "https://vcsnsx-vc.infra.demo.redhat.com"
govc_username: "sandbox-XXXXX@demo"
govc_password: "YourPasswordHere"
govc_insecure: true
govc_datastore: "workload_share_XXXXX"

# VMware VM placement
vm_network: "segment-sandbox-XXXXX"
vm_folder: "/SDDC-Datacenter/vm/Workloads/sandbox-XXXXX"
vm_guest_id: "other3xLinux64Guest"
vm_firmware: "bios"
vm_cpus: 2
vm_memory_mb: 4096
vm_disk_controller: "scsi"

# Datastore paths for VMDK upload (relative to datastore root)
datastore_base: "Workload-Portability"

# VM names
db01_vm_name: "todo-db"
web01_vm_name: "todo-web"

# Container images — preloaded into Podman storage at build time (VMs cannot pull from quay.io at boot)
govc_image: "docker.io/vmware/govc:latest"
todo_db_image: "quay.io/rh-ee-sbajaj/todo-db:latest"
todo_web_image: "quay.io/rh-ee-sbajaj/todo-web:latest"

# Offline image tars on bastion when quay.io denies pulls during build
todo_db_image_tar: "{{ work_base }}/todo-db.tar"
todo_web_image_tar: "{{ work_base }}/todo-web.tar"

# Alpine rootfs build
alpine_version: "3.20"
alpine_mirror: "https://dl-cdn.alpinelinux.org/alpine"
alpine_image: "docker.io/library/alpine:{{ alpine_version }}"
disk_mb: 600

# Podman image used for qemu-img when the bastion has no dnf repos
qemu_img_image: "docker.io/library/alpine:3.20"

# Build directories on the bastion (use sudo so artifacts land in /root/minimal-build)
work_base: "{{ ansible_env.HOME | default(lookup('env', 'HOME'), true) | default('/root') }}/minimal-build"
govc_env_path: "{{ work_base }}/govc.env"
db01_build_dir: "{{ work_base }}/todo-db"
web01_build_dir: "{{ work_base }}/todo-web"

# Web VM login (created in Alpine rootfs for SSH troubleshooting)
web_ssh_user: "demo"
web_ssh_password: "demo"

# Override after DB VM is deployed; leave empty to auto-detect via VMware Tools
db_host: ""
db_port: 5432

# Optional static IPs — use when govc vm.ip cannot see VMware Tools yet
db01_static_ip: ""
web01_static_ip: ""
alpine_static_netmask: "255.255.255.0"
alpine_static_gateway: ""

# VMware NIC type for govc vm.create (e1000 is the most compatible with minimal Alpine)
vm_net_adapter: e1000

# Per-attempt wait passed to govc vm.ip -wait=
vm_ip_wait: "60s"
vm_ip_retries: 20
vm_ip_retry_delay: 10

# Bastion firewalld — forward public HTTP to todo-web
bastion_firewall_forward_port: 80
todo_web_service_port: 80

# Cleanup playbook toggles (cleanup-minimal-vms.yml)
cleanup_vms: true
cleanup_datastore_vmdks: true
cleanup_datastore_folder: true
cleanup_bastion_firewall: true
cleanup_local_build: true
cleanup_remove_masquerade: false
