---
# db or web — set by the playbook
fedora_role: db
fedora_min_free_mb: 100
fedora_vmdk_subformat: streamOptimized
fedora_build_dir: "{{ work_base }}/fedora-build"
fedora_hostname: fedora-vm

fedora_image: "docker.io/library/fedora:{{ fedora_version }}"
fedora_output_dir: "{{ fedora_build_dir }}/output"
fedora_mnt: "{{ fedora_build_dir }}/mnt"
fedora_raw: "{{ fedora_build_dir }}/disk.raw"
fedora_vmdk: "{{ fedora_output_dir }}/disk.vmdk"

# Intentionally tiny — no NetworkManager, no firmware, no netavark (host networking only)
fedora_common_packages:
  - systemd
  - systemd-udev
  - systemd-networkd
  - kernel-core
  - kernel-modules
  - grub2-pc
  - grub2-tools
  - e2fsprogs
  - iproute
  - ca-certificates
  - podman
  - open-vm-tools
  - util-linux
  - passwd
  - shadow-utils

# Dropped from dnf installroot (hardware firmware / extras we do not need in VMware)
fedora_dnf_exclude:
  - "linux-firmware*"
  - "*-firmware"
  - kernel-modules-extra
  - dracut-config-rescue
  - plymouth
  - fwupd
  - ModemManager
  - NetworkManager*
  - netavark
  - aardvark-dns

fedora_static_ip: ""
fedora_static_netmask: "255.255.255.0"
fedora_static_gateway: ""
fedora_static_prefix: 24

fedora_web_packages:
  - openssh-server
  - iptables-nft
  - sudo

# SELinux on lab bastions blocks writes without label=disable
fedora_podman_run: "podman run --rm --user 0:0 --security-opt label=disable"
fedora_podman_run_privileged: >-
  podman run --rm --privileged --user 0:0 --security-opt label=disable
