---
- name: Discover todo-web IP for bastion firewall
  ansible.builtin.command:
    cmd: "{{ govc_cmd }} vm.ip -wait={{ vm_ip_wait }} {{ web01_vm_name }}"
  register: bastion_fw_web_ip
  changed_when: false
  when: todo_web_ip | length == 0

- name: Set todo-web IP for bastion firewall
  ansible.builtin.set_fact:
    todo_web_ip: "{{ bastion_fw_web_ip.stdout | trim }}"
  when: todo_web_ip | length == 0

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true

- name: Check whether bastion allows incoming HTTP port
  ansible.builtin.command:
    cmd: firewall-cmd --query-port={{ bastion_firewall_forward_port }}/tcp
  register: fw_http_port_check
  failed_when: false
  changed_when: false

- name: Allow incoming HTTP on bastion firewall
  ansible.builtin.command:
    cmd: firewall-cmd --permanent --add-port={{ bastion_firewall_forward_port }}/tcp
  when: fw_http_port_check.rc != 0

- name: List permanent HTTP forward rules on bastion
  ansible.builtin.command:
    cmd: firewall-cmd --permanent --list-forward-ports
  register: fw_all_forwards
  changed_when: false

- name: Remove stale bastion HTTP forward rules
  ansible.builtin.command:
    cmd: firewall-cmd --permanent --remove-forward-port={{ item }}
  loop: >-
    {{ fw_all_forwards.stdout_lines
       | select('match', '^port=' + bastion_firewall_forward_port | string + ':proto=tcp:.*')
       | reject('search', 'toaddr=' + todo_web_ip)
       | list }}
  when: item | length > 0

- name: Check whether bastion HTTP forward rule exists
  ansible.builtin.command:
    cmd: >-
      firewall-cmd --query-forward-port=port={{ bastion_firewall_forward_port }}:proto=tcp:toport={{ todo_web_service_port }}:toaddr={{ todo_web_ip }}
  register: fw_forward_check
  failed_when: false
  changed_when: false

- name: Forward bastion HTTP to todo-web
  ansible.builtin.command:
    cmd: >-
      firewall-cmd --permanent
      --add-forward-port=port={{ bastion_firewall_forward_port }}:proto=tcp:toport={{ todo_web_service_port }}:toaddr={{ todo_web_ip }}
  when: fw_forward_check.rc != 0

- name: Check whether masquerade is enabled on bastion
  ansible.builtin.command:
    cmd: firewall-cmd --query-masquerade
  register: fw_masq_check
  failed_when: false
  changed_when: false

- name: Enable masquerade on bastion firewall
  ansible.builtin.command:
    cmd: firewall-cmd --permanent --add-masquerade
  when: fw_masq_check.rc != 0

- name: Reload bastion firewall
  ansible.builtin.command:
    cmd: firewall-cmd --reload
  changed_when: true
