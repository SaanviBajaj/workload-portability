---
- name: Build package list for image role
  ansible.builtin.set_fact:
    fedora_install_packages: >-
      {{ fedora_common_packages +
         (fedora_web_packages if fedora_role == 'web' else []) }}
    fedora_embed_image: "{{ todo_db_image if fedora_role == 'db' else todo_web_image }}"
    fedora_embed_tar: "{{ 'todo-db' if fedora_role == 'db' else 'todo-web' }}.tar"
    fedora_embed_tar_path: "{{ todo_db_image_tar if fedora_role == 'db' else todo_web_image_tar }}"

- name: Render guest start script
  ansible.builtin.template:
    src: "{{ 'todo-db-start.sh.j2' if fedora_role == 'db' else 'todo-web-start.sh.j2' }}"
    dest: "{{ fedora_artifacts_dir }}/todo-start.sh"
    mode: "0755"

- name: Render guest systemd unit
  ansible.builtin.template:
    src: "{{ 'todo-db.service.j2' if fedora_role == 'db' else 'todo-web.service.j2' }}"
    dest: "{{ fedora_artifacts_dir }}/todo.service"
    mode: "0644"

- name: Render journald volatile config
  ansible.builtin.template:
    src: journald-volatile.conf.j2
    dest: "{{ fedora_artifacts_dir }}/journald-volatile.conf"
    mode: "0644"

- name: Render cloud-init network disable snippet
  ansible.builtin.template:
    src: 99-disable-network-config.cfg.j2
    dest: "{{ fedora_artifacts_dir }}/99-disable-network-config.cfg"
    mode: "0644"

- name: Render NetworkManager DHCP connection
  ansible.builtin.template:
    src: nm-dhcp.nmconnection.j2
    dest: "{{ fedora_artifacts_dir }}/wired-dhcp.nmconnection"
    mode: "0600"

- name: Render static NetworkManager connection when static IP set
  ansible.builtin.template:
    src: nm-static.nmconnection.j2
    dest: "{{ fedora_artifacts_dir }}/wired-static.nmconnection"
    mode: "0600"
  when: fedora_static_ip | length > 0

- name: Render first-boot customize helper
  ansible.builtin.template:
    src: guest-setup.sh.j2
    dest: "{{ fedora_artifacts_dir }}/guest-setup.sh"
    mode: "0755"

- name: Render disk repack script
  ansible.builtin.template:
    src: repack-disk.sh.j2
    dest: "{{ fedora_build_dir }}/repack-disk.sh"
    mode: "0755"

- name: Pull container image on bastion for VMDK embedding
  ansible.builtin.command:
    cmd: podman pull {{ fedora_embed_image }}
  register: fedora_embed_pull
  failed_when: false
  changed_when: fedora_embed_pull.rc == 0

- name: Save pulled container image archive for VMDK embedding
  ansible.builtin.command:
    cmd: podman save -o {{ fedora_artifacts_dir }}/{{ fedora_embed_tar }} {{ fedora_embed_image }}
  when: fedora_embed_pull.rc == 0
  changed_when: true

- name: Check for offline container image archive on bastion
  ansible.builtin.stat:
    path: "{{ fedora_embed_tar_path }}"
  register: fedora_offline_tar
  when: fedora_embed_pull.rc != 0

- name: Stage offline container image archive for VMDK embedding
  ansible.builtin.copy:
    src: "{{ fedora_embed_tar_path }}"
    dest: "{{ fedora_artifacts_dir }}/{{ fedora_embed_tar }}"
    remote_src: true
    mode: "0644"
  when:
    - fedora_embed_pull.rc != 0
    - fedora_offline_tar.stat.exists | default(false)

- name: Fail when container image is unavailable for embedding
  ansible.builtin.fail:
    msg: >-
      Could not pull {{ fedora_embed_image }} (quay.io often denies pulls in lab environments).
      On a machine that can reach quay.io, run:
        podman pull {{ fedora_embed_image }}
        podman save -o {{ fedora_embed_tar }} {{ fedora_embed_image }}
      Copy {{ fedora_embed_tar }} to the bastion at {{ fedora_embed_tar_path }}, then re-run.
  when:
    - fedora_embed_pull.rc != 0
    - not (fedora_offline_tar.stat.exists | default(false))
