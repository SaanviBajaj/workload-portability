---
- name: Convert repacked qcow2 to streamOptimized VMDK
  ansible.builtin.command:
    cmd: >-
      qemu-img convert -p -f qcow2 -O vmdk
      -o subformat={{ fedora_vmdk_subformat }}
      {{ fedora_qcow_repacked }}
      {{ fedora_vmdk }}
  register: fedora_vmdk_convert
  async: 1800
  poll: 10

- name: Report VMDK output
  ansible.builtin.command:
    cmd: qemu-img info {{ fedora_vmdk }}
  register: fedora_vmdk_info
  changed_when: false

- name: Show VMDK info
  ansible.builtin.debug:
    msg: "{{ fedora_vmdk_info.stdout_lines }}"
