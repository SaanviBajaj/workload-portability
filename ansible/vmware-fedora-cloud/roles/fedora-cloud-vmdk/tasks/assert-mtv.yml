---
# Stock Cloud Base layout is inspectable; use normal virt-* inspection APIs.

- name: Read os-release from final image
  ansible.builtin.command:
    cmd: virt-cat -a {{ fedora_qcow_repacked }} /etc/os-release
  environment:
    PATH: "{{ work_base }}/bin:{{ ansible_env.PATH }}"
    LIBGUESTFS_BACKEND: "{{ libguestfs_backend }}"
  register: fedora_os_release
  changed_when: false

- name: Assert ID=fedora in os-release
  ansible.builtin.assert:
    that:
      - "'ID=fedora' in fedora_os_release.stdout"
    fail_msg: >-
      /etc/os-release missing ID=fedora — MTV will reject this guest.
      Got: {{ fedora_os_release.stdout }}

- name: List /boot contents in final image
  ansible.builtin.command:
    cmd: virt-ls -a {{ fedora_qcow_repacked }} /boot
  environment:
    PATH: "{{ work_base }}/bin:{{ ansible_env.PATH }}"
    LIBGUESTFS_BACKEND: "{{ libguestfs_backend }}"
  register: fedora_boot_ls
  changed_when: false

- name: Assert kernel and initramfs exist under /boot
  ansible.builtin.assert:
    that:
      - fedora_boot_ls.stdout is search('vmlinuz')
      - fedora_boot_ls.stdout is search('initramfs') or fedora_boot_ls.stdout is search('initrd')
    fail_msg: >-
      /boot is missing vmlinuz/initramfs — virt-v2v inspection will fail.
      Listing: {{ fedora_boot_ls.stdout }}

- name: Check open-vm-tools / vmtoolsd presence
  ansible.builtin.shell: |
    set -o pipefail
    virt-cat -a {{ fedora_qcow_repacked }} /usr/lib/systemd/system/vmtoolsd.service 2>/dev/null \
      || virt-ls -a {{ fedora_qcow_repacked }} /usr/bin | grep -E 'vmtoolsd|vmware-toolbox' \
      || virt-ls -a {{ fedora_qcow_repacked }} /usr/sbin | grep -E 'vmtoolsd'
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ work_base }}/bin:{{ ansible_env.PATH }}"
    LIBGUESTFS_BACKEND: "{{ libguestfs_backend }}"
  register: fedora_vmtools_check
  changed_when: false
  failed_when: fedora_vmtools_check.rc != 0

- name: Confirm virt-inspector sees a Fedora guest
  ansible.builtin.command:
    cmd: virt-inspector -a {{ fedora_qcow_repacked }}
  environment:
    PATH: "{{ work_base }}/bin:{{ ansible_env.PATH }}"
    LIBGUESTFS_BACKEND: "{{ libguestfs_backend }}"
  register: fedora_inspector
  changed_when: false

- name: Assert virt-inspector output looks like Fedora/Linux
  ansible.builtin.assert:
    that:
      - fedora_inspector.stdout is search('(?i)fedora') or fedora_inspector.stdout is search('(?i)<name>linux</name>')
    fail_msg: >-
      virt-inspector did not report a Fedora guest — MTV conversion will fail.
      Output: {{ fedora_inspector.stdout }}

- name: Check free space on root for MTV headroom
  ansible.builtin.shell: |
    set -o pipefail
    virt-df -h -a {{ fedora_qcow_repacked }}
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ work_base }}/bin:{{ ansible_env.PATH }}"
    LIBGUESTFS_BACKEND: "{{ libguestfs_backend }}"
  register: fedora_df
  changed_when: false

- name: Show free space report
  ansible.builtin.debug:
    msg: "{{ fedora_df.stdout_lines }}"

- name: Report provisioned disk size
  ansible.builtin.command:
    cmd: qemu-img info --output=json {{ fedora_qcow_repacked }}
  environment:
    PATH: "{{ work_base }}/bin:{{ ansible_env.PATH }}"
  register: fedora_qcow_info
  changed_when: false

- name: Parse virtual size from qcow2
  ansible.builtin.set_fact:
    fedora_virtual_bytes: "{{ (fedora_qcow_info.stdout | from_json)['virtual-size'] }}"
    fedora_virtual_gib: "{{ (((fedora_qcow_info.stdout | from_json)['virtual-size'] | int) / (1024*1024*1024)) | round(2) }}"

- name: Report Cloud Base provisioned size
  ansible.builtin.debug:
    msg: >-
      Final guest virtual size ≈ {{ fedora_virtual_gib }} GiB
      (stock Fedora Cloud Base layout — not tar-repacked).
      streamOptimized VMDK file size will be closer to used data.
